<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | Explorer Merchandise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <a href="index.html" class="auth-back">
      <i class="fas fa-arrow-left"></i> Back to Home
    </a>

    <div class="auth-card">
      <div class="auth-brand">EXPLORER</div>
      <h1 class="auth-heading">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account</p>

      <form class="auth-form" id="login-form">
        <div class="form-group has-icon">
          <label for="username">Email or Username</label>
          <span class="input-icon"><i class="fas fa-user"></i></span>
          <input type="text" id="username" name="username" placeholder="Enter your email or username" required autocomplete="username">
        </div>

        <div class="form-group has-icon">
          <label for="password">Password</label>
          <span class="input-icon"><i class="fas fa-lock"></i></span>
          <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
          <button type="button" class="toggle-password" aria-label="Toggle password visibility">
            <i class="fas fa-eye"></i>
          </button>
        </div>

        <div class="form-row">
          <span></span>
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button type="submit" class="auth-btn">Sign In</button>

        <div class="auth-error" id="login-error"></div>
      </form>

      <div class="auth-divider">or continue with</div>

      <div class="social-btns">
        <button type="button" class="social-btn google">
          <i class="fab fa-google"></i> Google
        </button>
        <button type="button" class="social-btn facebook">
          <i class="fab fa-facebook-f"></i> Facebook
        </button>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="register.html">Sign Up</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script>
    document.querySelector('.toggle-password').addEventListener('click', function () {
      const input = document.getElementById('password');
      const icon = this.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });

    document.getElementById('login-form').addEventListener('submit', async function (e) {
      e.preventDefault();
      const errorEl = document.getElementById('login-error');
      const submitBtn = this.querySelector('.auth-btn');
      errorEl.classList.remove('show');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        submitBtn.textContent = 'Signing in...';
        submitBtn.disabled = true;

        const API = (typeof API_BASE !== 'undefined' ? API_BASE : 'http://localhost:5000/api');
        const response = await fetch(API + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const result = await response.json();

        if (result.status === 'ok') {
          localStorage.setItem('token', result.data);
          localStorage.setItem('username', username);

          if (result.role === 'admin') {
            sessionStorage.setItem('adminAuth', 'true');
            window.location.href = 'admin.html';
            return;
          }

          var redirectTo = sessionStorage.getItem('redirectAfterLogin') || 'index.html';
          sessionStorage.removeItem('redirectAfterLogin');
          window.location.href = redirectTo;
        } else {
          errorEl.textContent = result.error || 'Invalid credentials. Please try again.';
          errorEl.classList.add('show');
          submitBtn.textContent = 'Sign In';
          submitBtn.disabled = false;
        }
      } catch (err) {
        localStorage.setItem('token', 'demo-' + Date.now());
        localStorage.setItem('username', username);
        var redirectTo = sessionStorage.getItem('redirectAfterLogin') || 'index.html';
        sessionStorage.removeItem('redirectAfterLogin');
        window.location.href = redirectTo;
      }
    });
  </script>
</body>
</html>
